name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo cp /home/ec2-user/index.html /usr/share/nginx/html/ 2>/dev/null || true
            sudo cp /home/ec2-user/style.css /usr/share/nginx/html/ 2>/dev/null || true
            sudo cp /home/ec2-user/script.js /usr/share/nginx/html/ 2>/dev/null || true

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "index.html,style.css,script.js"
          target: /usr/share/nginx/html/